kind = "web"
previewPath = "/"
title = "Apex Virtual Assistance"
version = "1.0.0"
id = "artifacts/apex-va"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21603

[services.development]
run = "pnpm --filter @workspace/apex-va run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apex-va", "run", "build" ]
publicDir = "artifacts/apex-va/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21603"
BASE_PATH = "/"
